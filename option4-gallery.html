<!DOCTYPE html>
<html>
<head>
    <title>Special Photos - Option 4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 20px; 
            background: #0a0a1a; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #e0e0e0;
        }
        h1 { 
            color: #FFD700; 
            text-align: center; 
            margin-bottom: 30px; 
            text-shadow: 0 0 20px #FFD700;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
        }
        .row {
            display: flex;
            gap: 20px;
            justify-content: center;
            max-width: 95vw;
            margin-bottom: 20px;
        }
        .single {
            display: flex;
            justify-content: center;
            max-width: 95vw;
        }
        .row img, .single img {
            flex: 1;
            max-width: 45vw;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
            border: 3px solid #FFD700;
        }
        .single img {
            max-width: 60vw;
        }
        @media (max-width: 768px) {
            .row, .single {
                flex-direction: column;
                align-items: center;
            }
            .row img, .single img {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <h1>🌙 Special Photos - Lolita Bhai 🌙</h1>
    <div class="row">
        <img src="file:/Ayan ga pasa/BG pic/at1.png" alt="Photo 1">
        <img src="file:/Ayan ga pasa/BG pic/at3.png" alt="Photo 2">
    </div>
    <div class="single">
        <img src="file:/Ayan ga pasa/BG pic/at2.png" alt="Photo 3 - Centered">
    </div>
</body>
</html>
