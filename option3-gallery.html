<!DOCTYPE html>
<html>
<head>
    <title>Special Photos - Option 3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 20px; 
            background: #0a0a1a; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #e0e0e0;
        }
        h1 { 
            color: #FFD700; 
            text-align: center; 
            margin-bottom: 30px; 
            text-shadow: 0 0 20px #FFD700;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
        }
        .row {
            display: flex;
            gap: 20px;
            justify-content: center;
            max-width: 95vw;
            margin-bottom: 20px;
        }
        .row img, .row video {
            flex: 1;
            max-width: 45vw;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
            border: 3px solid #FFD700;
        }
        .youtube-link {
            margin-top: 20px;
            text-align: center;
        }
        .youtube-btn {
            display: inline-block;
            background: linear-gradient(45deg, #dab30a, #c7a611);
            color: rgb(8, 3, 3);
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(236, 233, 7, 0.904);
            transition: all 0.3s;
            border: none;
        }
        .youtube-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(253, 212, 29, 0.6);
        }
        @media (max-width: 768px) {
            .row {
                flex-direction: column;
                align-items: center;
            }
            .row img, .row video {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <h1>🌙 Special Photos & Video - GAEBHAI 🌙</h1>
    <div class="row">
        <img src="file:///G:/Ayan ga pasa/BG pic/up1.png" alt="Photo 1">
        <img src="file:///G:/Ayan ga pasa/BG pic/up2.png" alt="Photo 2">
    </div>
    <div class="row">
        <img src="file:///G:/Ayan ga pasa/BG pic/up3.png" alt="Photo 3">
        <video controls preload="metadata">
            <source src="file:///G:/Ayan ga pasa/BG pic/upvid.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="youtube-link">
        <a href="https://youtu.be/pWgpVfZRd9A?si=YwQBQYsNJBYJFVVq" target="_blank" class="youtube-btn">🎥 Watch Special Video</a>
    </div>
</body>
</html>
